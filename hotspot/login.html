<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🌸 Meylisa Hotspot · Cutecore 🌸</title>

$(if chap-id)
<form name="sendin" action="$(link-login-only)" method="post" style="display:none">
  <input type="hidden" name="username" />
  <input type="hidden" name="password" />
  <input type="hidden" name="dst" value="$(link-orig)" />
  <input type="hidden" name="popup" value="true" />
</form>
<script src="/md5.js"></script>
<script>
function doLogin() {
  document.sendin.username.value = document.login.username.value;
  document.sendin.password.value =
    hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
  document.sendin.submit();
  return false;
}
</script>
$(endif)

<style>
/* ========== RESET & GLOBAL ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: linear-gradient(145deg, #ffe4f0 0%, #ffc0dd 100%);
  font-family: 'Quicksand', 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Comic Neue', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow-x: hidden;
  padding: 20px;
}

/* ========== CUTECORE DECORATIONS ========== */
.deco-star {
  position: absolute;
  color: #fff5e6;
  text-shadow: 0 0 6px #ffb7c5;
  pointer-events: none;
  z-index: 1;
  font-size: 1.6rem;
  animation: floatSoft 5s infinite alternate ease-in-out;
  opacity: 0.85;
}

@keyframes floatSoft {
  0% { transform: translateY(0px) rotate(0deg); }
  100% { transform: translateY(-15px) rotate(6deg); }
}

.floating-heart {
  position: absolute;
  color: #ff99bb;
  font-size: 1.2rem;
  pointer-events: none;
  animation: heartFloatUp 10s linear infinite;
  opacity: 0;
  z-index: 1;
  filter: drop-shadow(0 2px 4px rgba(255,80,120,0.3));
}

@keyframes heartFloatUp {
  0% {
    transform: translateY(100vh) scale(0.4);
    opacity: 0;
  }
  15% {
    opacity: 0.8;
  }
  85% {
    opacity: 0.7;
  }
  100% {
    transform: translateY(-20vh) scale(1.1);
    opacity: 0;
  }
}

.bubble-soft {
  position: absolute;
  background: radial-gradient(circle, rgba(255,220,235,0.5) 0%, rgba(255,180,210,0.25) 100%);
  border-radius: 50%;
  backdrop-filter: blur(4px);
  pointer-events: none;
  z-index: 0;
  animation: bubbleWobble 10s infinite alternate ease-in-out;
}

@keyframes bubbleWobble {
  0% { transform: translateX(0px) scale(1); }
  100% { transform: translateX(25px) scale(1.04); }
}

/* ========== CARD UTAMA ========== */
.login-card {
  width: 100%;
  max-width: 390px;
  background: rgba(255, 250, 252, 0.88);
  backdrop-filter: blur(16px);
  border-radius: 64px 48px 72px 56px;
  box-shadow: 0 30px 45px rgba(255, 80, 120, 0.25), 0 0 0 3px rgba(255, 245, 250, 0.9) inset, 0 0 0 6px #ffe2f0 inset;
  padding: 28px 26px 38px;
  text-align: center;
  transition: all 0.2s ease;
  z-index: 20;
  border: 1px solid rgba(255, 220, 230, 0.9);
}

/* Avatar area */
.avatar-box {
  margin-bottom: 10px;
  position: relative;
}

.avatar-emoji {
  font-size: 70px;
  filter: drop-shadow(2px 8px 14px #ffa5c4);
  display: inline-block;
  animation: gentleBounce 2.2s infinite;
}

@keyframes gentleBounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* Judul */
h2 {
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(135deg, #FF7CAE, #FF336F);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -0.3px;
  margin-bottom: 6px;
  display: inline-block;
  padding: 0 8px;
}

.tagline {
  font-size: 0.75rem;
  font-weight: 600;
  color: #ff88b3;
  background: rgba(255, 248, 245, 0.8);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 5px 16px;
  border-radius: 60px;
  margin-bottom: 20px;
  backdrop-filter: blur(4px);
  letter-spacing: 0.3px;
}

/* Input fields */
.input-field {
  margin-bottom: 20px;
  text-align: left;
  position: relative;
}

.input-icon {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.2rem;
  color: #ff7aa8;
  pointer-events: none;
  z-index: 2;
  transition: all 0.2s;
}

input[type="text"],
input[type="password"] {
  width: 100%;
  padding: 14px 16px 14px 50px;
  font-size: 0.95rem;
  background: rgba(255, 255, 250, 0.95);
  border: 2px solid #ffcddf;
  border-radius: 100px;
  outline: none;
  font-family: inherit;
  font-weight: 500;
  transition: 0.2s;
  color: #a33f62;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}

input[type="text"]:focus,
input[type="password"]:focus {
  border-color: #ff699c;
  background: #ffffff;
  box-shadow: 0 0 0 4px rgba(255, 110, 150, 0.2);
}

input::placeholder {
  color: #ffb7cf;
  font-weight: 500;
  font-size: 0.8rem;
}

/* Tombol login */
.login-btn {
  background: linear-gradient(115deg, #ff90bc, #ff5288);
  border: none;
  width: 100%;
  padding: 14px 10px;
  border-radius: 100px;
  font-weight: bold;
  font-size: 1.2rem;
  color: white;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 10px 20px #ffa5c466;
  margin-top: 8px;
  letter-spacing: 1px;
}

.login-btn:hover {
  background: linear-gradient(115deg, #ff6fa0, #ff3b77);
  transform: scale(0.97);
  box-shadow: 0 5px 12px #ff88ae;
}

.login-btn span {
  font-size: 1.3rem;
}

/* Error message cantik */
.error-cute {
  background: rgba(255, 225, 225, 0.95);
  backdrop-filter: blur(8px);
  padding: 10px 18px;
  border-radius: 80px;
  font-size: 0.8rem;
  color: #cd3764;
  font-weight: 700;
  border-left: 5px solid #ff628c;
  text-align: center;
  display: inline-block;
  width: auto;
  max-width: 100%;
  margin-bottom: 18px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.02);
}

/* Footer */
.cute-footer {
  margin-top: 26px;
  font-size: 0.7rem;
  color: #ff94b9;
  display: flex;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
  font-weight: 600;
}

.cute-footer span {
  font-size: 0.85rem;
}

/* Responsive */
@media (max-width: 480px) {
  .login-card {
    padding: 22px 18px 32px;
    border-radius: 52px 40px 60px 48px;
  }
  h2 {
    font-size: 1.7rem;
  }
  .avatar-emoji {
    font-size: 58px;
  }
  .login-btn {
    padding: 12px 10px;
    font-size: 1rem;
  }
}
</style>
</head>
<body>

<!-- DECORATIONS: BINTANG & GELEMBUNG (statis, tidak menyebabkan error layout) -->
<div class="deco-star" style="top: 6%; left: 5%;">🌟</div>
<div class="deco-star" style="top: 14%; right: 8%; font-size: 2rem; animation-duration: 6s;">✨</div>
<div class="deco-star" style="bottom: 12%; left: 8%; animation-duration: 7s;">⭐</div>
<div class="deco-star" style="bottom: 25%; right: 4%;">🌸</div>
<div class="deco-star" style="top: 45%; left: 2%; animation-duration: 8s;">🍰</div>
<div class="deco-star" style="top: 75%; right: 9%;">🎀</div>
<div class="deco-star" style="top: 85%; left: 12%;">💗</div>

<!-- Gelembung lembut -->
<div class="bubble-soft" style="width: 90px; height: 90px; bottom: -30px; left: -30px;"></div>
<div class="bubble-soft" style="width: 150px; height: 150px; bottom: -60px; right: -50px; animation-duration: 12s;"></div>
<div class="bubble-soft" style="width: 70px; height: 70px; top: 20%; right: 10%; animation-duration: 8s;"></div>
<div class="bubble-soft" style="width: 110px; height: 110px; top: 65%; left: -40px; animation-duration: 11s;"></div>
<div class="bubble-soft" style="width: 55px; height: 55px; bottom: 25%; left: 20%; animation-duration: 9s;"></div>

<!-- Container untuk floating hearts (dibuat via JS, aman) -->
<div id="floating-hearts-area"></div>

<script>
// Fungsi membuat floating heart dengan random posisi & delay — tidak mengganggu tata letak
function addFloatingHeart() {
  const heartContainer = document.getElementById('floating-hearts-area');
  if (!heartContainer) return;
  const heartDiv = document.createElement('div');
  heartDiv.classList.add('floating-heart');
  const heartSymbols = ['💖', '🌸', '🐇', '🎀', '🍬', '💗', '✨', '💕', '🍰', '🐣'];
  heartDiv.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
  // posisi horizontal acak (0% - 100%)
  heartDiv.style.left = Math.random() * 100 + '%';
  heartDiv.style.fontSize = (Math.random() * 18 + 14) + 'px';
  heartDiv.style.animationDuration = (Math.random() * 8 + 7) + 's';
  heartDiv.style.animationDelay = (Math.random() * 5) + 's';
  heartContainer.appendChild(heartDiv);
  // hapus setelah animasi selesai
  setTimeout(() => {
    if (heartDiv && heartDiv.remove) heartDiv.remove();
  }, 14000);
}

// memulai floating hearts secara periodik (tidak overload)
let heartInterval;
if (typeof window !== 'undefined') {
  heartInterval = setInterval(addFloatingHeart, 2000);
  // tambahkan beberapa hati awal agar terlihat ramai
  setTimeout(() => { for(let i=0;i<5;i++) setTimeout(addFloatingHeart, i*300); }, 300);
}

// cleanup interval jika diperlukan (tapi untuk landing page biasa aman)
window.addEventListener('beforeunload', function() {
  if (heartInterval) clearInterval(heartInterval);
});
</script>

<!-- MAIN LOGIN CARD -->
<div class="login-card">
  <div class="avatar-box">
    <div class="avatar-emoji">🐇🎀💗</div>
  </div>
  <h2>meylisa hotspot</h2>
  <div class="tagline">
    <span>✦</span> cutecore internet <span>✦</span>
  </div>

  <!-- menampilkan error dari mikrotik jika ada -->
  $(if error)
  <div class="error-cute">
    ⚘ $(error) ⚘
  </div>
  $(endif)

  <!-- FORM LOGIN -->
  <form name="login" action="$(link-login-only)" method="post"
        $(if chap-id) onsubmit="return doLogin()" $(endif)>
    
    <input type="hidden" name="dst" value="$(link-orig)">
    <input type="hidden" name="popup" value="true">
    
    <!-- Username -->
    <div class="input-field">
      <div class="input-icon">👧🏻</div>
      <input type="text" name="username" placeholder="username" value="$(username)" autocomplete="off">
    </div>
    
    <!-- Password -->
    <div class="input-field">
      <div class="input-icon">🔐💗</div>
      <input type="password" name="password" placeholder="password" autocomplete="off">
    </div>
    
    <button type="submit" class="login-btn">
      <span>🌸</span> Login <span>🍰</span>
    </button>
  </form>
  
  <div class="cute-footer">
    <span>🍼</span> sweet connection · by meylisa <span>🎀</span>
  </div>
</div>

<script>
// memastikan fokus pada username setelah halaman dimuat
(function() {
  if (document.login && document.login.username) {
    document.login.username.focus();
  }
  // tambahan: memastikan tidak ada error tampilan karena karakter khusus
  // semua elemen dinamis sudah aman
})();
</script>
</body>
</html>
